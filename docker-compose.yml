services:

  # ─── FastAPI — 2 instances (load balancing ke liye) ────────────────
  api1:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - backend
    # API ports bahar expose mat karo — sirf nginx se access ho
    expose:
      - "8000"

  api2:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - backend
    expose:
      - "8000"

  # ─── Nginx — Reverse Proxy + Load Balancer ─────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"          # Production: 80
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/static:/usr/share/nginx/html/static:ro
    restart: unless-stopped
    networks:
      - backend

  # ─── PostgreSQL ─────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine        # alpine = chhoti image ✅
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # DB ko bahar expose mat karo production mein
    # ports: - "5432:5432"   # Sirf local development mein uncomment karo
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

# ─── Volumes ─────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ─── Networks ────────────────────────────────────────────────────────
networks:
  backend:
    driver: bridge
