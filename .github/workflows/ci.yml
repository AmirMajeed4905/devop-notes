name: CI/CD Pipeline

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Tests 
  # ─────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
      SECRET_KEY: test-secret-key-only-for-ci

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"                    # pip cache — faster builds

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests -q --tb=short

  # ─────────────────────────────────────────

  # ─────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: test                          
    if: github.event_name == 'push'      

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
       
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/my-fastapi-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/my-fastapi-app:${{ github.sha }}
          cache-from: type=gha           # GitHub Actions cache — faster builds
          cache-to: type=gha,mode=max