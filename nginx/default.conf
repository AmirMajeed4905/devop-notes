# Load balancer — traffic api1 aur api2 mein equally distribute karo
upstream app_servers {
    server api1:8000;
    server api2:8000;
    keepalive 32;              # Connection reuse — faster ✅
}

server {
    listen 80;
    server_name _;             # Koi bhi domain/IP accept karo

    client_max_body_size 10m;
    charset utf-8;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Static files — Nginx khud serve kare, FastAPI ko load na de
    location /static/ {
        alias /usr/share/nginx/html/static/;
        access_log off;
        expires 7d;            # Browser 7 din cache kare ✅
        add_header Cache-Control "public, immutable";
    }

    # API — FastAPI ko forward karo
    location / {
        proxy_pass http://app_servers;
        proxy_http_version 1.1;

        # Real IP forward karo
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout  5s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # Health check endpoint — load balancer ke liye
    location /health {
        proxy_pass http://app_servers;
        access_log off;        # Health check logs spam na karein
    }
}
